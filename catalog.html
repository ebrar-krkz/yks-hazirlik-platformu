<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konu Kataloğu | SEBA Akademi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1220;--panel:#0f172a;--muted:#94a3b8;--text:#e2e8f0;
      --brand:#3b82f6;--brand-2:#7c3aed;--glass:rgba(255,255,255,.06);
      --radius:18px; --border:rgba(255,255,255,.08);
      --ok:#22c55e; --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:'Inter',system-ui;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(59,130,246,.18), transparent),
        radial-gradient(1000px 500px at 110% 10%, rgba(124,58,237,.18), transparent),
        radial-gradient(900px 500px at 40% 120%, rgba(34,197,94,.08), transparent),
        var(--bg);
      color:var(--text);line-height:1.6;
    }
    a{text-decoration:none;color:inherit}
    .container{width:min(1180px,92%);margin-inline:auto}

    .nav{
      position:sticky;top:0;z-index:50;
      backdrop-filter:saturate(1.2) blur(10px);
      background:linear-gradient(to bottom, rgba(11,18,32,.92), rgba(11,18,32,.55));
      border-bottom:1px solid rgba(255,255,255,.06)
    }
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px;gap:14px}
    .brand{display:flex;align-items:center;gap:12px;min-width:max-content}
    .logo{
      width:36px;height:36px;border-radius:10px;
      background:conic-gradient(from 180deg,var(--brand),var(--brand-2));
      box-shadow:0 0 0 4px rgba(59,130,246,.15)
    }
    .nav-links{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 14px;border-radius:12px;
      border:1px solid var(--border);
      background:var(--glass);cursor:pointer;font-weight:650;
      transition:.18s transform, .18s filter, .18s background;
      user-select:none;
    }
    .btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
    .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand-2));border-color:transparent}

    main{padding:40px 0 60px}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
      border-radius:var(--radius);
      border:1px solid var(--border);
      padding:24px;
      box-shadow:0 18px 60px rgba(0,0,0,.28);
      overflow:hidden;
      position:relative;
    }
    .card:before{
      content:""; position:absolute; inset:-2px;
      background: radial-gradient(600px 220px at 10% 0%, rgba(59,130,246,.20), transparent 60%),
                  radial-gradient(620px 260px at 90% 10%, rgba(124,58,237,.18), transparent 60%);
      pointer-events:none;
      opacity:.9;
    }
    .card > *{position:relative}

    .top{
      display:flex; align-items:flex-end; justify-content:space-between; gap:16px;
      flex-wrap:wrap; margin-bottom:14px;
    }
    h1{margin:0;font-size:28px;letter-spacing:-.3px}
    .muted{color:var(--muted)}
    .sub{margin:6px 0 0}

    .controls{
      margin-top:16px;
      display:grid;
      grid-template-columns: 1.25fr .9fr auto auto;
      gap:12px;
      align-items:center;
    }
    .field{
      display:flex;align-items:center;gap:10px;
      padding:12px 12px;border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
    }
    .field input,.field select{
      width:100%;
      background:transparent; border:0; outline:0;
      color:var(--text); font-size:14px;
    }
    .field select option{color:#0b1220}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      font-weight:700;
      white-space:nowrap;
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background:linear-gradient(135deg,var(--brand),var(--brand-2));
      box-shadow:0 0 0 4px rgba(59,130,246,.15);
    }
    .btn-ghost{background:rgba(255,255,255,.04)}

    .tabs{display:flex;gap:10px;margin:18px 0 10px;flex-wrap:wrap}
    .tab{
      padding:10px 14px;border-radius:12px;
      background:var(--glass);
      border:1px solid var(--border);
      cursor:pointer;font-weight:750;
      transition:.18s transform, .18s background;
    }
    .tab:hover{transform:translateY(-1px)}
    .tab.active{background:linear-gradient(135deg, rgba(59,130,246,.30), rgba(124,58,237,.26))}

    .subjects{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
    @media(max-width:1100px){.controls{grid-template-columns:1fr 1fr auto auto}.subjects{grid-template-columns:1fr 1fr}}
    @media(max-width:680px){.controls{grid-template-columns:1fr}.subjects{grid-template-columns:1fr}}

    .subject{
      padding:16px;border-radius:16px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      transition:.18s transform, .18s background, .18s border-color;
      position:relative;
      overflow:hidden;
    }
    .subject:hover{transform:translateY(-2px);background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12)}
    .subject .head{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
      margin-bottom:6px;
    }
    .subject h3{margin:0;font-size:16px;letter-spacing:-.2px}
    .badge{
      font-size:12px;font-weight:800;
      padding:6px 10px;border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);
      white-space:nowrap;
    }
    .badge.ok{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.10)}
    .badge.warn{border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.10)}

    details{border-radius:14px}
    summary{
      list-style:none;
      cursor:pointer;
      user-select:none;
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.03);
      font-weight:750;
    }
    summary::-webkit-details-marker{display:none}
    summary .chev{
      margin-left:auto;
      opacity:.9;
      transform:rotate(0deg);
      transition:.18s transform;
      width:20px; height:20px;
      display:grid; place-items:center;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }
    details[open] summary .chev{transform:rotate(180deg)}
    .topic-wrap{padding:10px 2px 2px}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{
      padding:8px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.035);
      font-size:13px;font-weight:650;
      color:var(--text);
    }

    .empty{
      padding:18px;border-radius:16px;
      border:1px dashed rgba(255,255,255,.18);
      color:var(--muted);
      background:rgba(255,255,255,.03);
      grid-column:1/-1;
    }

    .footer-note{
      margin-top:14px;
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
      color:var(--muted);
      font-size:13px;
    }
    .mini{
      padding:8px 10px;border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
    }
  </style>
</head>

      SOZ: [

          "Güzel Sanatlar ve Edebiyat","Metinlerin Sınıflandırılması","Şiir Bilgisi","Söz Sanatları","İslamiyet Öncesi Türk Edebiyatı",
          "İslami Dönem Türk Edebiyatı","Halk Edebiyatı","Divan Edebiyatı","Edebi Akımlar","Tanzimat Edebiyatı","Servet-i Fünun Edebiyatı",
          "Fecr-i Âti Edebiyatı","Milli Edebiyat","Cumhuriyet Dönemi Türk Edebiyatı","Batı Edebiyatı"
        ]},
        { title:"Tarih-1/2", desc:"AYT Sözel • Tarih", topics:[
          "Tarih Bilimine Giriş","Uygarlığın Doğuşu ve İlk Çağ Uygarlıkları","İlk Türk Devletleri","İslam Tarihi ve Uygarlığı","Türk–İslam Devletleri",
          "Türkiye Tarihi (10–13. Y.Y)","Beylikten Devlete (Kuruluş Dönemi)","Dünya Gücü: Osmanlı Devleti (Yükselme Dönemi)",
          "Osmanlı Devleti’nin Kültür ve Uygarlığı","Yeni Çağ Avrupa Tarihi","Arayış Yılları (Duraklama Dönemi)","18. YY Değişim ve Diplomasi (Gerileme Dönemi)",
          "Yakın Çağ Avrupa Tarihi","En Uzun Yüzyıl (Dağılma Dönemi)","Mustafa Kemal Atatürk’ün Hayatı","Milli Mücadele’nin Hazırlık Dönemi",
          "Kurtuluş Savaşında Cepheler","Türk İnkılabı","Atatürkçülük ve Atatürk İlkeleri","XX. Yüzyıl Başlarında Dünya","II. Dünya Savaşı (1939–1945)",
          "Soğuk Savaş Dönemi","Yumuşama (Detant) Dönemi ve Sonrası","Küreselleşen Dünya","Türklerde Devlet Teşkilatı","Türklerde Toplum Yapısı",
          "Türklerde Hukuk","Türklerde Ekonomi","Türklerde Eğitim","Türklerde Sanat"
        ]},
        { title:"Coğrafya-1/2", desc:"AYT Sözel • Coğrafya", topics:[
          "Doğal Sistemler","Beşeri Sistemler","Mekansal Bir Sentez: Türkiye","Küresel Ortam: Bölgeler ve Ülkeler",
          "Ülkeler ve Uluslararası Örgütler","Çevre ve Toplum"
        ]},
        { title:"Felsefe", desc:"AYT Sözel • Felsefe", topics:[
          "Felsefenin Alanı","Bilgi Felsefesi","Bilim Felsefesi","Varlık Felsefesi","Ahlak Felsefesi","Siyaset Felsefesi","Sanat Felsefesi","Din Felsefesi"
        ]},
        { title:"Mantık", desc:"AYT Sözel • Mantık", topics:["Mantığa Giriş","Klasik Mantık","Mantık ve Dil","Sembolik Mantık"]},
        { title:"Psikoloji", desc:"AYT Sözel • Psikoloji", topics:["Psikoloji Bilimini Tanıyalım","Psikolojinin Temel Süreçleri","Öğrenme Bellek Düşünme","Ruh Sağlığının Temelleri"]},
        { title:"Din Kültürü", desc:"AYT Sözel • Din Kültürü", topics:[
          "Kur’an-ı Kerim’in Anlaşılması ve Kavranması","İnsan ve Din","İslam ve İbadetler","İslam Düşüncesinde Yorumlar, Mezhepler",
          "Muhammed’in Hayatı, Örnekliği ve Onu Anlama","İslam ve Bilim, Estetik, Barış","Yaşayan Dinler ve Benzer Özellikleri"
        ]},
      ]
    };

    // State
    const subjectsEl = $("#subjects");
    const searchEl = $("#search");
    const filterEl = $("#subjectFilter");
    const counterText = $("#counterText");

    const STORAGE_KEY = "seba_catalog_state_v1";
    let currentExam = "TYT";
    let openAll = false;

    function loadState(){
      try{
        const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        if(s.currentAytTrack) currentAytTrack = s.currentAytTrack;
        if(s.currentExam) currentExam = s.currentExam;
        if(typeof s.search === "string") searchEl.value = s.search;
        if(typeof s.filter === "string") filterEl.value = s.filter;
      }catch(e){}
    }
    function saveState(){
      const state = { currentExam, currentAytTrack, search: searchEl.value, filter: filterEl.value };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getCatalog(){
      if(currentExam === "TYT") return TYT_CATALOG;
      return AYT_GROUPS[currentAytTrack] || [];
    }

    function escapeHtml(str){
      return String(str).replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"
      }[m]));
    }

    function normalize(s){
      return (s||"").toString().toLowerCase().trim();
    }

    function buildFilterOptions(){
      const data = getCatalog();
      const options = data.map(x => x.title);
      const current = filterEl.value || "ALL";
      filterEl.innerHTML = `<option value="ALL">Tüm Dersler</option>` +
        options.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join("");
      if(options.includes(current)) filterEl.value = current;
      else filterEl.value = "ALL";
    }

    function matches(subject, q){
      if(!q) return true;
      const hay = normalize(subject.title + " " + subject.desc + " " + (subject.topics||[]).join(" "));
      return hay.includes(q);
    }

    function chipList(topics, q){
      if(!topics?.length) return "";
      const nq = normalize(q);
      const filtered = !nq ? topics : topics.filter(t => normalize(t).includes(nq));
      if(!filtered.length){
        return `<div class="muted" style="padding:6px 4px 2px">Bu aramaya uygun konu bulunamadı.</div>`;
      }
      return `<div class="chips">` + filtered.map(t => `<span class="chip">${escapeHtml(t)}</span>`).join("") + `</div>`;
    }

    function subjectCard(subject, q){
      const topicCount = subject.topics?.length || 0;
      const badgeClass = topicCount >= 15 ? "ok" : (topicCount >= 8 ? "warn" : "");
      return `
        <article class="subject">
          <div class="head">
            <div>
              <h3>${escapeHtml(subject.title)}</h3>
              <div class="muted" style="font-size:13px;margin-top:4px">${escapeHtml(subject.desc || "")}</div>
            </div>
            <span class="badge ${badgeClass}">${topicCount} konu</span>
          </div>

          <details ${openAll ? "open" : ""}>
            <summary>
              Konuları Göster
              <span class="chev">⌄</span>
            </summary>
            <div class="topic-wrap">
              ${chipList(subject.topics, q)}
            </div>
          </details>
        </article>
      `;
    }

    function render(){
      const q = normalize(searchEl.value);
      const filter = filterEl.value;

      let data = getCatalog();

      if(filter && filter !== "ALL"){
        data = data.filter(s => s.title === filter);
      }

      const shown = data.filter(s => matches(s, q));
      counterText.textContent = `${shown.length} ders`;

      if(!shown.length){
        subjectsEl.innerHTML = `
          <div class="empty">
            <b>Sonuç yok.</b><br>
            Aramayı değiştir veya “Tüm Dersler” seçip tekrar dene.
          </div>
        `;
        return;
      }

      subjectsEl.innerHTML = shown.map(s => subjectCard(s, q)).join("");
    }

    // AYT alt tabs
    const aytTabsEl = document.getElementById("ayt-track-tabs");

    function syncAytTabsVisibility(){
      if(!aytTabsEl) return;
      aytTabsEl.style.display = (currentExam === "AYT") ? "flex" : "none";
    }

    if(aytTabsEl){
      aytTabsEl.addEventListener("click", (e)=>{
        const btn = e.target.closest("button[data-track]");
        if(!btn) return;

        currentAytTrack = btn.dataset.track;

        [...aytTabsEl.querySelectorAll(".tab")].forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        buildFilterOptions();
        render();
        saveState();
      });
    }

    function setTab(exam){
      currentExam = exam;

      $("#tab-tyt").classList.toggle("active", exam==="TYT");
      $("#tab-ayt").classList.toggle("active", exam==="AYT");
      $("#tab-tyt").setAttribute("aria-selected", exam==="TYT");
      $("#tab-ayt").setAttribute("aria-selected", exam==="AYT");

      syncAytTabsVisibility();
      buildFilterOptions();
      render();
      saveState();
    }

    $("#tab-tyt").addEventListener("click", ()=>setTab("TYT"));
    $("#tab-ayt").addEventListener("click", ()=>setTab("AYT"));

    searchEl.addEventListener("input", ()=>{ render(); saveState(); });
    filterEl.addEventListener("change", ()=>{ render(); saveState(); });

    $("#expandAll").addEventListener("click", ()=>{
      openAll = true;
      $$("details").forEach(d => d.open = true);
    });

    $("#collapseAll").addEventListener("click", ()=>{
      openAll = false;
      $$("details").forEach(d => d.open = false);
    });

    // Init
    loadState();

    // AYT track button active sync
    if(aytTabsEl){
      [...aytTabsEl.querySelectorAll(".tab")].forEach(b=>{
        b.classList.toggle("active", b.dataset.track === currentAytTrack);
      });
    }

    setTab(currentExam);

    // Eğer daha önce kaydedilmiş filtre yüzünden boş görünürse otomatik toparla:
    if(!getCatalog().length){
      currentExam = "TYT";
      currentAytTrack = "SAY";
      filterEl.value = "ALL";
      setTab("TYT");
    }
  </script>
</body>
</html>
