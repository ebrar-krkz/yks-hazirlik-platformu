<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Öğrenci Paneli | AscendEdu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b1220;--panel:#0f172a;--glass:rgba(255,255,255,.06);--muted:#94a3b8;--text:#e2e8f0;--brand:#3b82f6;--brand2:#7c3aed}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text)}
    .nav{
      position:sticky;top:0;z-index:30;
      background:linear-gradient(to bottom,rgba(11,18,32,.95),rgba(11,18,32,.6));
      border-bottom:1px solid rgba(255,255,255,.08)
    }
    .container{width:min(1200px,94%);margin-inline:auto}
    .nav-inner{display:flex;justify-content:space-between;align-items:center;height:64px}
    .btn{
      padding:10px 14px;border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:var(--glass);color:inherit;
      text-decoration:none;font-weight:600;cursor:pointer
    }
    .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));border-color:transparent}
    .grid{display:grid;grid-template-columns:1fr 330px;gap:16px;padding:16px 0}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;padding:16px
    }
    h2{margin:0 0 6px}
    .muted{color:var(--muted)}
    .tabs{display:flex;gap:8px;margin:8px 0 12px}
    .tab{
      padding:8px 12px;border-radius:10px;
      background:var(--glass);border:1px solid rgba(255,255,255,.08);
      cursor:pointer;font-weight:600
    }
    .tab.active{background:linear-gradient(135deg,rgba(59,130,246,.25),rgba(124,58,237,.25))}
    .subjects{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .subject{
      padding:12px;border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04)
    }
    .chip{
      padding:8px 10px;border-radius:12px;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.06);
      font-size:14px;font-weight:600;cursor:pointer
    }
    @media(max-width:980px){
      .grid{grid-template-columns:1fr}
      .subjects{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <b>AscendEdu • Öğrenci</b>
      <div style="display:flex;gap:8px;align-items:center">
        <small class="muted">Plan: <span id="planText"></span></small>
        <a class="btn" href="plan.html">Plan Yükselt</a>
        <button class="btn" id="logout">Çıkış</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="grid">
      <section class="card">
        <h2>Çalışma Alanı</h2>
        <p class="muted">Son izlenen video, test sonuçların ve notların burada.</p>
        <div class="tabs">
          <button class="tab active" id="t-tyt">TYT</button>
          <button class="tab" id="t-ayt">AYT</button>
        </div>
        <div id="subjects" class="subjects"></div>
      </section>
      <aside class="card">
        <h3>Özet</h3>
        <ul id="summary" class="muted" style="line-height:1.9;margin:0;padding-left:16px"></ul>
        <hr style="border-color:rgba(255,255,255,.08)">
        <h3>Notlarım</h3>
        <textarea id="notes" placeholder="Bugünkü çalışma notların..." style="width:100%;min-height:140px;border-radius:12px;padding:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:inherit"></textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:8px">
          <button class="btn btn-primary" id="saveNotes">Kaydet</button>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const guard=()=>{
      const logged=localStorage.getItem('loggedIn')==='1';
      const role=localStorage.getItem('role');
      if(!logged||role!=='student'){
        alert('Öğrenci girişi gerekli.');
        location.href='login.html';
      }
    };
    guard();

    const $=(s,r=document)=>r.querySelector(s); const $$=(s,r=document)=>[...r.querySelectorAll(s)];
    const plan=localStorage.getItem('plan')||'none';
    $('#planText').textContent= plan==='full' ? 'TYT+AYT' : (plan==='tyt' ? 'TYT' : 'Yok');

    const TYT=[{t:'Temel Matematik',d:'Sayılar, problemler',preview:true},{t:'Türkçe',d:'Paragraf, dil bilgisi'},{t:'Fen Bilimleri',d:'Fizik–Kimya–Biyoloji'}];
    const AYT=[{t:'AYT Matematik',d:'Limit, türev, integral'},{t:'AYT Fizik',d:'Dalgalar, E-M'},{t:'AYT Edebiyat',d:'Dönemler'}];

    let current='TYT';
    function locked(){return (current==='TYT' && plan==='none') || (current==='AYT' && plan!=='full');}
    function card(it){
      const isLocked = locked() && !it.preview;
      return `<article class="subject">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h4>${it.t}</h4>
          ${isLocked?'<span style="font-size:12px;color:#fca5a5">🔒</span>':'<span style="font-size:12px;color:#86efac">Açık</span>'}
        </div>
        <p class="muted" style="margin:6px 0 10px">${it.d}</p>
        <div style="display:flex;gap:8px">
          <button class="chip" ${isLocked?'disabled':''} data-act="video">🎥 Video</button>
          <button class="chip" ${isLocked?'disabled':''} data-act="test">🧪 Test</button>
        </div>
      </article>`;
    }
    function render(){
      const data=current==='TYT'?TYT:AYT;
      $('#subjects').innerHTML=data.map(card).join('');
      $$('#subjects .chip').forEach(b=>b.addEventListener('click',()=>alert('Demo içerik.')));
    }
    render();

    $('#t-tyt').addEventListener('click',()=>{
      current='TYT';
      $('#t-tyt').classList.add('active');
      $('#t-ayt').classList.remove('active');
      render();
    });
    $('#t-ayt').addEventListener('click',()=>{
      current='AYT';
      $('#t-ayt').classList.add('active');
      $('#t-tyt').classList.remove('active');
      render();
    });

    // Özet & Notlar
    const summary=$('#summary');
    const results=JSON.parse(localStorage.getItem('results')||'[]');
    summary.innerHTML = `
      <li>Toplam test: ${results.length}</li>
      <li>Ortalama skor: ${results.length? Math.round(results.reduce((a,b)=>a+b,0)/results.length):0}%</li>
      <li>Plan: ${$('#planText').textContent}</li>`;

    $('#notes').value = localStorage.getItem('notes')||'';
    $('#saveNotes').addEventListener('click',()=>{
      localStorage.setItem('notes',$('#notes').value);
      alert('Not kaydedildi.');
    });

    $('#logout').addEventListener('click',()=>{
      localStorage.removeItem('loggedIn');
      localStorage.removeItem('role');
      location.href='index.html';
    });
  </script>
</body>
</html>
